<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050506">
  <title>Ariston Game Controller</title>
  <style>
    :root {
      --green: #009b4e;
      --green-light: #22c878;
      --red: #e21c2a;
      --red-light: #ff4651;
      --surface: #111214;
      --line: rgba(255, 255, 255, 0.12);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; overscroll-behavior: none; background: #050506; color: #fff; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; touch-action: none; }
    body {
      display: flex; align-items: center; justify-content: center;
      padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      background: radial-gradient(circle at 18% 0%, rgba(0, 155, 78, 0.14), transparent 32%), radial-gradient(circle at 85% 100%, rgba(226, 28, 42, 0.12), transparent 34%), #050506;
    }
    main { width: min(100%, 560px); height: 100%; display: grid; grid-template-rows: minmax(92px, 1fr) minmax(78px, 0.72fr) minmax(112px, 1fr); gap: clamp(14px, 2.4vh, 24px); }
    .brand { position: relative; display: flex; align-items: center; justify-content: center; min-height: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 24px; background: #000; box-shadow: 0 18px 55px rgba(0, 0, 0, 0.45), inset 0 1px rgba(255, 255, 255, 0.04); }
    .brand img { display: block; width: 100%; max-width: 520px; max-height: 100%; object-fit: contain; }
    .status { position: absolute; top: 14px; right: 14px; width: 14px; height: 14px; border-radius: 50%; background: var(--red); border: 3px solid #09090a; box-shadow: 0 0 0 2px rgba(226, 28, 42, 0.28), 0 0 14px rgba(226, 28, 42, 0.7); }
    .status.connected { background: var(--green-light); box-shadow: 0 0 0 2px rgba(34, 200, 120, 0.25), 0 0 14px rgba(34, 200, 120, 0.7); }
    button { position: relative; width: 100%; min-height: 0; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.16); border-radius: 24px; color: #fff; font: inherit; font-weight: 850; letter-spacing: 0.045em; cursor: pointer; touch-action: none; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.42), inset 0 1px rgba(255, 255, 255, 0.2), inset 0 -3px rgba(0, 0, 0, 0.24); transition: transform 70ms ease, box-shadow 70ms ease, filter 100ms ease; }
    button::after { content: ""; position: absolute; inset: 1px 10% auto; height: 42%; border-radius: 999px; background: linear-gradient(to bottom, rgba(255, 255, 255, 0.13), transparent); pointer-events: none; }
    button:active, button.active { transform: translateY(5px) scale(0.99); box-shadow: 0 3px 10px rgba(0, 0, 0, 0.5), inset 0 2px 5px rgba(0, 0, 0, 0.26); filter: brightness(0.9); }
    button:focus-visible { outline: 3px solid rgba(34, 200, 120, 0.65); outline-offset: 3px; }
    #start { background: linear-gradient(145deg, var(--green-light), #007b3d 72%); font-size: clamp(1.25rem, 5vw, 2rem); text-shadow: 0 2px 5px rgba(0, 0, 0, 0.35); }
    .movement { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(14px, 3vw, 22px); min-height: 0; }
    .move { background: linear-gradient(145deg, #2a2d32, #111214 72%); font-size: clamp(1.25rem, 5.5vw, 2rem); }
    #left { border-bottom-color: var(--green); }
    #right { background: linear-gradient(145deg, var(--red-light), #b80f1a 72%); border-bottom-color: var(--red); text-shadow: 0 2px 5px rgba(0, 0, 0, 0.35); }
    @media (orientation: landscape) and (max-height: 520px) {
      main { max-width: 820px; grid-template: 1fr 1fr / minmax(190px, 0.95fr) 1.2fr; }
      .brand { grid-row: 1 / 3; }
      .movement { grid-column: 2; }
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <img src="Ariston.png" alt="Ariston Italian Heritage">
      <span id="status" class="status" role="status" aria-label="Firebase disconnected" title="Firebase disconnected"></span>
    </div>

    <button id="start" type="button">START GAME</button>

    <div class="movement">
      <button id="left" class="move" type="button" aria-label="Move left">Left&nbsp; ←</button>
      <button id="right" class="move" type="button" aria-label="Move right">Right&nbsp; →</button>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCMtbsKNIET9NjOyw2XHzA9PfyBn1yO1O4",
      authDomain: "fallingobjects-46163.firebaseapp.com",
      databaseURL: "https://fallingobjects-46163-default-rtdb.firebaseio.com",
      projectId: "fallingobjects-46163",
      storageBucket: "fallingobjects-46163.firebasestorage.app",
      messagingSenderId: "243170931177",
      appId: "1:243170931177:web:778f044433b5ee2956db78",
      measurementId: "G-39GSTNJQPB"
    };

    firebase.initializeApp(firebaseConfig);

    const database = firebase.database();
    const controlRef = database.ref("devices/samsung-screen-01/control");
    const connectedRef = database.ref(".info/connected");
    const status = document.getElementById("status");
    const startButton = document.getElementById("start");
    const leftButton = document.getElementById("left");
    const rightButton = document.getElementById("right");

    let movementPointerId = null;
    let movementButton = null;
    let startTimer = null;

    function writeControl(values) {
      controlRef.update(values).catch((error) => console.error("Firebase write failed:", error));
    }

    function stopMovement() {
      if (movementButton) movementButton.classList.remove("active");
      movementPointerId = null;
      movementButton = null;
      writeControl({ horizontal: 0 });
    }

    function beginMovement(event, direction, button) {
      if (!event.isPrimary || event.button !== 0) return;
      event.preventDefault();
      stopMovement();
      movementPointerId = event.pointerId;
      movementButton = button;
      button.classList.add("active");
      button.setPointerCapture(event.pointerId);
      writeControl({ horizontal: direction });
    }

    function endMovement(event) {
      if (movementPointerId === event.pointerId) stopMovement();
    }

    leftButton.addEventListener("pointerdown", (event) => beginMovement(event, -1, leftButton));
    rightButton.addEventListener("pointerdown", (event) => beginMovement(event, 1, rightButton));
    document.addEventListener("pointerup", endMovement);
    document.addEventListener("pointercancel", endMovement);
    leftButton.addEventListener("lostpointercapture", endMovement);
    rightButton.addEventListener("lostpointercapture", endMovement);

    startButton.addEventListener("pointerdown", (event) => {
      if (!event.isPrimary || event.button !== 0) return;
      event.preventDefault();
      clearTimeout(startTimer);
      writeControl({ start: true });
      startTimer = setTimeout(() => writeControl({ start: false }), 500);
    });

    connectedRef.on("value", (snapshot) => {
      const connected = snapshot.val() === true;
      status.classList.toggle("connected", connected);
      status.setAttribute("aria-label", connected ? "Firebase connected" : "Firebase disconnected");
      status.title = connected ? "Firebase connected" : "Firebase disconnected";
    });

    window.addEventListener("blur", stopMovement);
    window.addEventListener("pagehide", stopMovement);
    window.addEventListener("beforeunload", stopMovement);
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) stopMovement();
    });

    document.addEventListener("contextmenu", (event) => event.preventDefault());
    document.addEventListener("dragstart", (event) => event.preventDefault());
    document.addEventListener("touchmove", (event) => event.preventDefault(), { passive: false });
    document.addEventListener("gesturestart", (event) => event.preventDefault());

    writeControl({ horizontal: 0, start: false });
  </script>
</body>
</html>
